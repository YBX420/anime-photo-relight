name: Deploy Fan Feng Shui to GitHub Pages

# Publishes the static game in fan-cooling-game/ to GitHub Pages.
# Requires repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main, claude/fan-cooling-game-sa3af4]
    paths: ['fan-cooling-game/**', '.github/workflows/deploy-fan-game.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # auto-enable Pages (Source: GitHub Actions) via the API so no manual
          # repo-settings step is needed; requires the pages: write permission above
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: fan-cooling-game
      - id: deployment
        uses: actions/deploy-pages@v4
